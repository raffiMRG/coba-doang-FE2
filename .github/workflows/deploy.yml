name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -f Dockerfile.production -t raffimrg/manga-app-frontend:latest .

      - name: Push Image
        run: docker push raffimrg/manga-app-frontend:latest

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull latest image
        run: |
          cd /home/mrg/code/manga/fe-build
          docker compose pull

      - name: Restart containers
        run: |
          cd /home/mrg/code/manga/fe-build
          docker compose up -d
