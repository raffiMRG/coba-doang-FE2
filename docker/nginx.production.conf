# Direct LAN/Tailscale access never sends X-Forwarded-Proto (cloudflared
# always does), so use its presence to tell the two cases apart: through the
# tunnel we're https on the default port; direct we're http on the published
# host port (8000).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ''      http;
}
map $http_x_forwarded_proto $forwarded_port {
    default 443;
    ''      8000;
}

server {
    listen 80;
    index index.php index.html;
    server_name _;
    root /var/www/public;

    client_max_body_size 50M;

    access_log /dev/stdout;
    error_log /dev/stderr;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PORT $forwarded_port;
    }

    location ~ /\.ht {
        deny all;
    }
}
